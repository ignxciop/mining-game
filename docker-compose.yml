  #     db:
  #       condition: service_healthy
  #   networks:
  #     - mining-net

  # ── PostgreSQL (Future) ────────────────────────────────────────────────────
  # db:
  #   image: postgres:16-alpine
  #   container_name: mining-db
  #   restart: unless-stopped
  #   ports:
  #     - "${DB_PORT:-5432}:5432"
  #   environment:
  #     - POSTGRES_USER=${DB_USER:-mining}
  #     - POSTGRES_PASSWORD=${DB_PASS:-mining}
  #     - POSTGRES_DB=${DB_NAME:-mining}
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
