# =============================================================================
# Mining Game — Docker Compose
# Production-ready stack with nginx reverse proxy
# =============================================================================

services:
  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: mining-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-4011}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      game:
        condition: service_started
      # backend:
      #   condition: service_started
    networks:
      - mining-net

  # ── Frontend (Game) ────────────────────────────────────────────────────────
  game:
    build:
      context: ./game
      dockerfile: Dockerfile
    container_name: mining-game
    restart: unless-stopped
    expose:
      - "4011"
    networks:
      - mining-net

  # ── Cloudflare Tunnel ─────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mining-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:?error}
      - TUNNEL_DOMAIN=${TUNNEL_DOMAIN:?error}
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    depends_on:
      nginx:
        condition: service_started
    networks:
      - mining-net

  # ── Backend API (Future) ───────────────────────────────────────────────────
