# =============================================================================
# Mining Game — Docker Compose
# Production-ready stack with Cloudflare Tunnel
# =============================================================================

services:
  # ── Frontend (Game) ────────────────────────────────────────────────────────
  game:
    build:
      context: ./game
      dockerfile: Dockerfile
    container_name: mining-game
    restart: unless-stopped
    ports:
      - "4011:4011"
    networks:
      - mine-net

  # ── Cloudflare Tunnel ─────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mining-cloudflared
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    command:
      - tunnel
      - --no-autoupdate
      - run
    depends_on:
      - game
    networks:
      - mine-net

